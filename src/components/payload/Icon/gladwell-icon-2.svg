<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 400 400">
  <defs>
    <style>
      .cls-1 {
      isolation: isolate;
      }

      .cls-2 {
      fill: url(#radial-gradient);
      }
    </style>
    <radialGradient id="radial-gradient" cx="200" cy="200" fx="200" fy="200" r="200"
      gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1511be" />
      <stop offset=".15" stop-color="#1511be" stop-opacity=".97" />
      <stop offset="1" stop-color="#1511be" stop-opacity="0" />
